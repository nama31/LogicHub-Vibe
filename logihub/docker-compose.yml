services:
  db:
    image: postgres:15
    container_name: logihub_db
    restart: always
    environment:
      POSTGRES_USER: logihub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-logihub_secret}
      POSTGRES_DB: logihub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: