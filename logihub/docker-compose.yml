services:
  db:
    image: postgres:15
    container_name: logihub_db
    restart: always
    environment:
      POSTGRES_USER: logihub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-logihub_secret}
      POSTGRES_DB: logihub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: logihub_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: logihub_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://logihub:logihub_secret@localhost:5432/logihub}
      JWT_SECRET: ${JWT_SECRET:-supersecret123}
      BOT_SECRET: ${BOT_SECRET:-supersecretbot321}
    depends_on:
      - db
      - redis
    network_mode: host
    volumes:
      - ./backend:/app/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: logihub_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    network_mode: host
    volumes:
      - ./frontend:/app/frontend
      - frontend_next:/app/frontend/.next
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "set -e; if [ ! -x node_modules/.bin/next ]; then CI=true pnpm install --frozen-lockfile --config.confirmModulesPurge=false; fi; exec pnpm run dev"

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next: